{% extends "base.html" %}
{% block title %}Login - EduManage{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <h1 class="login-heading">
            <span class="login-heading-line1">Dr. G. R. Damodaran College of Science</span>
            <span class="login-heading-line2">(Autonomous)</span>
        </h1>
        <p class="subtitle">Login – Hall Reservation System</p>
        <form method="post" action="{{ url_for('auth.login') }}" class="login-form" autocomplete="off">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Enter username" autocomplete="off" autocapitalize="none" spellcheck="false">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password" autocomplete="new-password">
            <button type="submit" class="btn btn-primary"> Login</button>
        </form>
    </div>
</div>
{% endblock %}
